name: Strict CI Pipeline

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master

# Prevent concurrent runs of the same PR/branch to save compute minutes
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  commitlint:
    name: Enforce Conventional Commits
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Required for commitlint to analyze history

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Root Dependencies
        run: npm ci

      - name: Validate PR Commits
        run: npx commitlint --from ${{ github.event.pull_request.base.sha }} --to ${{ github.event.pull_request.head.sha }} --verbose

  code-quality:
    name: Code Quality & Dependency Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Root Dependencies
        run: npm ci

      - name: Check Formatting (Prettier)
        run: npx prettier --check .

      - name: Install Frontend Dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Frontend Static Analysis (ESLint)
        working-directory: ./frontend
        run: npm run lint

      - name: NPM Dependency Vulnerability Audit
        working-directory: ./frontend
        # Runs security audit, blocking the merge if high/critical vulnerabilities exist
        run: npm audit --audit-level=high

  container-security:
    name: Immutable Build & Security Scan
    runs-on: ubuntu-latest
    needs: code-quality # Wait for linting to pass before spending compute on Docker builds
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Build Backend Container
        run: docker build -t backend:ci ./backend

      - name: Build Frontend Container
        run: docker build -t frontend:ci ./frontend

      # Enforce Pillar 1 & 2: Shift-Left Security scanning on final Docker artifacts
      - name: Run Trivy Scanner (Backend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "backend:ci"
          format: "table"
          exit-code: "1" # Fails the pipeline if vulnerabilities are found
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"

      - name: Run Trivy Scanner (Frontend)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: "frontend:ci"
          format: "table"
          exit-code: "1"
          ignore-unfixed: true
          vuln-type: "os,library"
          severity: "CRITICAL,HIGH"
